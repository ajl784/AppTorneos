services:
  postgres:
    image: postgres:15
    container_name: app_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: app_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Backend/BD/bdr:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./Backend/BD/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d app_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: app_node
    ports:
      - "3000:3000"
    volumes:
      - .:/workspace
      - app_node_modules:/workspace/node_modules
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: admin
      DB_PASSWORD: password123
      DB_NAME: app_db
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  app_node_modules:
